name: Rails

on:
  push:
    branches:
      - 'main'
      - 'epic/**'
  pull_request:
  merge_group:

env:
  RUBY_VERSION: '3.3.2'
  RAILS_ENV: test
  RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
  DATABASE_URL: "postgres://tgdf:tgdf@localhost/tgdf"

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
    - name: Run Rubocop
      run: bundle exec rubocop

  brakeman:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
    - name: Run Brakeman
      run: bundle exec brakeman

  rspec:
    runs-on: ubuntu-latest
    services:
        postgres:
          image: postgres
          env:
            POSTGRES_USER: tgdf
            POSTGRES_PASSWORD: tgdf
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
          ports:
            - 5432:5432
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
    - name: Set up Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'
        cache: 'yarn'
    - run: yarn install
    - name: Prepare for Test
      run: |
        bundle exec rake assets:precompile
        bundle exec rake db:migrate
    - name: Run RSpec
      run: bundle exec rspec

  cucumber:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    services:
        postgres:
          image: postgres
          env:
            POSTGRES_USER: tgdf
            POSTGRES_PASSWORD: tgdf
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
          ports:
            - 5432:5432
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
    - name: Set up Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'
        cache: 'yarn'
    - run: yarn install
    - name: Prepare for Test
      run: |
        bundle exec rake assets:precompile
        bundle exec rake db:migrate
    - name: Run Cucumber
      run: bundle exec cucumber -f json -o tmp/cucumber-report.json
    - uses: deblockt/cucumber-report-annotations-action@6752fe2c8e2640f9c98687d7b1782e3755fbe434 # v1.16
      with:
        access-token: ${{ secrets.GITHUB_TOKEN }}
        path: "tmp/cucumber-report.json"
